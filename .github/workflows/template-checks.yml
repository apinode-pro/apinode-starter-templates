name: Template checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check Node starter syntax
        run: node --check templates/node-responses/index.mjs
      - name: Check Node embeddings starter syntax
        run: node --check templates/node-embeddings-client/index.mjs

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python starter syntax
        run: python -m py_compile templates/python-responses/main.py

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Check Go starter
        working-directory: templates/go-responses
        run: go test ./...

  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check Deno starter
        run: deno check templates/deno-responses/main.ts
